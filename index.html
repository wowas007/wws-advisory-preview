<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWS Advisory GmbH – Wolfgang Schmidt</title>
  <meta name="description" content="WWS Advisory GmbH – Deutsche, europäische und internationale Politik.&lt;br&gt;Sicherheit, Technologie und Verteidigung.&lt;br&gt;Wirtschaft und Finanzen." />
  <link rel="alternate" hreflang="de" href="https://wws-advisory.de/" />
  <link rel="alternate" hreflang="en" href="https://wwsadvisory.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #2d4a5e;
      font-family: 'Lato', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 500px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: left center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        transparent 25%,
        rgba(30,51,69,0.2) 55%,
        rgba(30,51,69,0.55) 100%
      );
    }
    .hero-overlay-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(30,51,69,0.5) 0%,
        rgba(30,51,69,0.15) 25%,
        transparent 50%
      );
    }

    /* Logo top-left — WWS bold, Advisory light */
    .logo {
      position: absolute;
      top: 28px; left: 40px;
      z-index: 10;
      line-height: 1.15;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s forwards;
    }
    .logo-wws {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      opacity: 0.85;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
    }
    .logo-advisory {
      font-size: 11px;
      font-weight: 300;
      color: #ffffff;
      opacity: 0.5;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      display: block;
    }

    /* Lang switcher top-right */
    .lang-switcher {
      position: absolute;
      top: 28px; right: 40px;
      z-index: 10;
      display: flex;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.15s forwards;
    }
    .lang-switcher a {
      font-size: 14px;
      color: #ffffff;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .lang-switcher a:hover { opacity: 0.8; }
    .lang-switcher a.active {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Firm name bottom-right */
    .hero-text {
      position: absolute;
      bottom: 60px; right: 60px;
      text-align: right;
      z-index: 10;
    }
    .hero-firm-line {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: clamp(10px, 1.5vw, 20px);
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-firm-wws {
      font-size: clamp(52px, 8vw, 110px);
      font-weight: 900;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 2px;
    }
    .hero-firm-advisory {
      font-size: clamp(52px, 8vw, 110px);
      font-weight: 300;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 1px;
    }
    .hero-sub {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: clamp(16px, 3vw, 40px);
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }
    .hero-firm-gmbh {
      font-size: clamp(13px, 1.8vw, 20px);
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .hero-person {
      font-size: clamp(18px, 2.8vw, 36px);
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1px;
    }

    /* Description text bottom-left */
    .hero-description {
      position: absolute;
      bottom: 60px; left: 40px;
      z-index: 10;
      max-width: 380px;
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s 0.55s forwards;
    }

    /* Links bottom-right */
    .links-right {
      position: absolute;
      bottom: 16px; right: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s forwards;
    }
    .links-right a, .links-right span {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
    }
    .links-right a:hover { color: rgba(255,255,255,0.7); }
    .links-right .sep { color: rgba(255,255,255,0.15); }
    .links-right a.site-link {
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 1px;
    }

    /* Legal links bottom-left */
    .links-left {
      position: absolute;
      bottom: 16px; left: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s forwards;
    }
    .links-left a {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      transition: color 0.2s;
    }
    .links-left a:hover { color: rgba(255,255,255,0.5); }
    .links-left .sep {
      font-size: 11px;
      color: rgba(255,255,255,0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .hero-text { right: 24px; bottom: 80px; }
      .hero-description { left: 24px; bottom: 80px; max-width: 200px; font-size: 12px; }
      .lang-switcher { right: 24px; top: 20px; }
      .logo { left: 24px; top: 20px; }
      .links-right { right: 24px; bottom: 12px; }
      .links-left { left: 24px; bottom: 12px; }
      .hero-sub { flex-direction: column; align-items: flex-end; gap: 4px; }
    }

    @media (max-width: 480px) {
      .hero-description { display: none; }
      .hero-text { right: 20px; left: 20px; bottom: 60px; }
      .hero-firm-line { flex-wrap: wrap; }
    }
  </style>

</head>
<body>

  <section class="hero">
    <img class="hero-bg" src="img/hero.webp" alt="Wolfgang Schmidt" />
    <div class="hero-overlay"></div>
    <div class="hero-overlay-bottom"></div>

    <div class="logo">
      <span class="logo-wws">WWS</span>
      <span class="logo-advisory">Advisory</span>
    </div>

    <div class="lang-switcher">
      <a href="#" class="active">DE</a>
      <a href="en/">EN</a>
    </div>

    <div class="hero-text">
      <div class="hero-firm-line">
        <span class="hero-firm-wws">WWS</span>
        <span class="hero-firm-advisory">Advisory</span>
      </div>
      <div class="hero-sub">
        <span class="hero-person">Wolfgang Schmidt</span>
        <span class="hero-firm-gmbh">GmbH</span>
      </div>
    </div>

    <div class="hero-description">
      Deutsche, europäische und internationale Politik.&lt;br&gt;Sicherheit, Technologie und Verteidigung.&lt;br&gt;Wirtschaft und Finanzen.
    </div>

    <div class="links-right">
      <a href="https://wolfgang-schmidt.eu" class="site-link" target="_blank" rel="noopener">wolfgang-schmidt.eu</a>
      <span class="sep">|</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.35);">info@wws-advisory.de</span>
    </div>

    <div class="links-left">
      <a href="impressum.html">Impressum</a>
      <span class="sep">|</span>
      <a href="datenschutz.html">Datenschutz</a>
    </div>
  </section>

</body>
</html>
