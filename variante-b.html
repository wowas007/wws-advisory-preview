<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Variante B – WWS Advisory GmbH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #2d4a5e;
      font-family: 'Lato', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 500px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: left center;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        transparent 25%,
        rgba(30,51,69,0.2) 55%,
        rgba(30,51,69,0.55) 100%
      );
    }
    .hero-overlay-bottom {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(30,51,69,0.5) 0%,
        rgba(30,51,69,0.15) 25%,
        transparent 50%
      );
    }

    /* Logo top-left with line */
    .logo {
      position: absolute;
      top: 28px; left: 40px;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s forwards;
    }
    .logo-wws {
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 2px;
      display: block;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.35);
    }
    .logo-advisory {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      display: block;
      margin-top: 4px;
    }

    .lang-switcher {
      position: absolute;
      top: 28px; right: 40px;
      z-index: 10;
      display: flex;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.15s forwards;
    }
    .lang-switcher a {
      font-size: 14px;
      color: #ffffff;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .lang-switcher a:hover { opacity: 0.8; }
    .lang-switcher a.active {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* VARIANTE B: WWS über ADVISORY gestapelt, gleich groß */
    .hero-text {
      position: absolute;
      bottom: 60px; right: 60px;
      text-align: right;
      z-index: 10;
    }
    .hero-firm-wws {
      font-size: clamp(48px, 7vw, 95px);
      font-weight: 900;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 3px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-firm-advisory {
      font-size: clamp(48px, 7vw, 95px);
      font-weight: 300;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: 1px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s forwards;
    }
    .hero-firm-gmbh {
      font-size: clamp(11px, 1.4vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 6px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.45s forwards;
    }
    .hero-person {
      font-size: clamp(16px, 2.2vw, 28px);
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      margin-top: 24px;
      letter-spacing: 1px;
      display: block;
      opacity: 0;
      animation: fadeUp 0.8s 0.55s forwards;
    }

    .hero-description {
      position: absolute;
      bottom: 60px; left: 40px;
      z-index: 10;
      max-width: 380px;
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s 0.65s forwards;
    }

    .links-right {
      position: absolute;
      bottom: 16px; right: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s forwards;
    }
    .links-right a, .links-right span {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
    }
    .links-right a:hover { color: rgba(255,255,255,0.7); }
    .links-right .sep { color: rgba(255,255,255,0.15); }
    .links-right a.site-link {
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 1px;
    }

    .links-left {
      position: absolute;
      bottom: 16px; left: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.7s 0.7s forwards;
    }
    .links-left a {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      transition: color 0.2s;
    }
    .links-left a:hover { color: rgba(255,255,255,0.5); }
    .links-left .sep { font-size: 11px; color: rgba(255,255,255,0.12); }

    .variant-label {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(0,0,0,0.3);
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .hero-text { right: 24px; bottom: 80px; }
      .hero-description { left: 24px; bottom: 80px; max-width: 200px; font-size: 12px; }
    }
    @media (max-width: 480px) {
      .hero-description { display: none; }
      .hero-text { right: 20px; left: 20px; bottom: 60px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <img class="hero-bg" src="img/hero.webp" alt="Wolfgang Schmidt" />
    <div class="hero-overlay"></div>
    <div class="hero-overlay-bottom"></div>

    <div class="variant-label">Variante B — gestapelt</div>

    <div class="logo">
      <span class="logo-wws">WWS</span>
      <span class="logo-advisory">Advisory</span>
    </div>

    <div class="lang-switcher">
      <a href="#" class="active">DE</a>
      <a href="#">EN</a>
    </div>

    <div class="hero-text">
      <span class="hero-firm-wws">WWS</span>
      <span class="hero-firm-advisory">Advisory</span>
      <span class="hero-firm-gmbh">GmbH</span>
      <span class="hero-person">Wolfgang Schmidt</span>
    </div>

    <div class="hero-description">
      Deutsche, europäische und internationale Politik.<br>
      Sicherheit, Technologie und Verteidigung.<br>
      Wirtschaft und Finanzen.
    </div>

    <div class="links-right">
      <a href="https://wolfgang-schmidt.eu" class="site-link">wolfgang-schmidt.eu</a>
      <span class="sep">|</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.35);">info@wws-advisory.de</span>
    </div>

    <div class="links-left">
      <a href="#">Impressum</a>
      <span class="sep">|</span>
      <a href="#">Datenschutz</a>
    </div>
  </section>
</body>
</html>
